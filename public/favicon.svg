<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#b5263a"/>

  <!-- Outer petal ring (8 petals) -->
  <g fill="#d4a017" opacity="0.9">
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(0 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(45 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(90 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(135 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(180 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(225 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(270 32 32)"/>
    <ellipse cx="32" cy="10" rx="3.5" ry="6" transform="rotate(315 32 32)"/>
  </g>

  <!-- Mid ring (8 smaller petals) -->
  <g fill="#f5e6c8" opacity="0.85">
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(22.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(67.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(112.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(157.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(202.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(247.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(292.5 32 32)"/>
    <ellipse cx="32" cy="16" rx="2.5" ry="5" transform="rotate(337.5 32 32)"/>
  </g>

  <!-- Inner decorative ring -->
  <circle cx="32" cy="32" r="11" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.9"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#f5e6c8" stroke-width="1" opacity="0.7"/>

  <!-- Small dots on inner ring -->
  <g fill="#d4a017">
    <circle cx="32" cy="21" r="1.5"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(45 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(90 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(135 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(180 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(225 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(270 32 32)"/>
    <circle cx="32" cy="21" r="1.5" transform="rotate(315 32 32)"/>
  </g>

  <!-- Center flower -->
  <circle cx="32" cy="32" r="5.5" fill="#d4a017"/>
  <circle cx="32" cy="32" r="3" fill="#b5263a"/>
  <circle cx="32" cy="32" r="1.5" fill="#f5e6c8"/>
</svg>
